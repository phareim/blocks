<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Block Blast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>BLOCK<span>BLAST</span></h1>
        <div id="score-display">
          <div class="score-label">SCORE</div>
          <div id="score">0</div>
        </div>
        <div id="high-score-display">
          <div class="score-label">BEST</div>
          <div id="high-score">0</div>
        </div>
      </header>

      <div id="game-area">
        <div id="board-container">
          <div id="board"></div>
          <div id="clear-flash"></div>
        </div>

        <div id="pieces-tray">
          <div class="piece-slot" data-slot="0"></div>
          <div class="piece-slot" data-slot="1"></div>
          <div class="piece-slot" data-slot="2"></div>
        </div>
      </div>

      <div id="game-over-overlay">
        <div id="game-over-content">
          <h2>GAME OVER</h2>
          <div id="final-score-label">SCORE</div>
          <div id="final-score">0</div>
          <button id="restart-btn">PLAY AGAIN</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
